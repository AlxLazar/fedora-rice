name: fedora-rice
description: My riced Hyprland build

base-image: ghcr.io/wayblueorg/hyprland
image-version: latest

modules:
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/solopasha/hyprland/repo/fedora-%OS_VERSION%/solopasha-hyprland-fedora-%OS_VERSION%.repo
    install:
      - nwg-look
      - rofi-wayland
      - swww
      - dunst
      - playerctl
      - brightnessctl
      - papirus-icon-theme
      - kitty

  - type: files
    files:
      - source: system
        destination: /
